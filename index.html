<!DOCTYPE html>
<html>
<head>
  <title>Kubernetes Usage Guide</title>
</head>
<body>
  <h1>Welcome to Kubernetes Basics</h1>
  <h2>Common Commands</h2>
  <ul>
    <li>kubectl get pods</li>
    <li>kubectl create deployment nginx --image=nginx</li>
    <li>kubectl expose deployment nginx --port=80 --type=LoadBalancer</li>
    <li>kubectl scale deployment nginx --replicas=3</li>
    <li>kubectl delete pod pod-name</li>
  </ul>
</body>
</html>
